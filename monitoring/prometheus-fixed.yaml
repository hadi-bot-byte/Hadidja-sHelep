grafana:
  enabled: true
  adminPassword: helep-admin-2024
  service:
    type: ClusterIP
    port: 80
  persistence:
    enabled: true
    size: 10Gi

prometheus:
  enabled: true
  prometheusSpec:
    retention: 7d
    retentionSize: 20GB  # Fixed: changed from "20Gi" to "20GB"
    resources:
      requests:
        memory: 512Mi
        cpu: 200m
      limits:
        memory: 1Gi
        cpu: 500m
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 20Gi

alertmanager:
  enabled: false

nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true

prometheusOperator:
  enabled: true
  resources:
    requests:
      memory: 256Mi
      cpu: 100m

defaultDashboards:
  enabled: true
