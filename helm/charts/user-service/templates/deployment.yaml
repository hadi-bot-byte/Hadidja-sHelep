apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  labels:
    app: user-service
spec:
  replicas: {{ .Values.replicas | default 1 }}
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: {{ .Values.image }}
          imagePullPolicy: Never
          ports:
            - containerPort: {{ .Values.port }}
          env:
            - name: SERVICE_PORT
              value: "{{ .Values.port }}"
            - name: KAFKA_BOOTSTRAP
              value: {{ .Values.global.kafka.bootstrap }}
            - name: JWT_SECRET
              value: {{ .Values.global.jwtSecret }}
            - name: DB_PATH
              value: /data/user.db
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: {{ .Values.port }}
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: user-service-pvc
