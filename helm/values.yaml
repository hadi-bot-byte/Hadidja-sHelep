global:
  kafka:
    bootstrap: helep-kafka-kafka-bootstrap.kafka.svc.cluster.local:9092
  jwtSecret: c3VwZXItc2VjcmV0LWtleS1jaGFuZ2UtaW4tcHJvZA==  # "super-secret-key-change-in-prod" in base64

ingress:
  enabled: false  # Set to true when ingress controller is ready
  host: helep.local

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  cpuTarget: 70
  memoryTarget: 80

userService:
  image: helep-user-service:latest
  port: 8001
  replicas: 1

sosService:
  image: helep-sos-service:latest
  port: 8002
  replicas: 1

dispatchService:
  image: helep-dispatch-service:latest
  port: 8003
  replicas: 1

notificationService:
  image: helep-notification-service:latest
  port: 8004
  replicas: 1

analyticsService:
  image: helep-analytics-service:latest
  port: 8005
  replicas: 1
