name: HELEP CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies - user-service
        run: pip install -r services/user-service/requirements.txt

      - name: Install dependencies - sos-service
        run: pip install -r services/sos-service/requirements.txt

      - name: Install dependencies - dispatch-service
        run: pip install -r services/dispatch-service/requirements.txt

      - name: Install dependencies - notification-service
        run: pip install -r services/notification-service/requirements.txt

      - name: Install dependencies - analytics-service
        run: pip install -r services/analytics-service/requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 services/ --max-line-length=120 --ignore=E501,W503 --exclude=__pycache__

      - name: Build Docker images
        run: |
          docker build -t helep-user-service:${{ github.sha }} services/user-service
          docker build -t helep-sos-service:${{ github.sha }} services/sos-service
          docker build -t helep-dispatch-service:${{ github.sha }} services/dispatch-service
          docker build -t helep-notification-service:${{ github.sha }} services/notification-service
          docker build -t helep-analytics-service:${{ github.sha }} services/analytics-service

      - name: Validate Helm chart
        run: |
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          helm lint helm/

      - name: Verify Kubernetes manifests
        run: |
          helm template helep helm/ > /tmp/manifests.yaml
          echo "Manifests generated successfully"
          cat /tmp/manifests.yaml | grep "kind:" | sort | uniq -c

  docker-push:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker images
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/helep-user-service:latest services/user-service
          docker build -t ${{ secrets.DOCKER_USERNAME }}/helep-sos-service:latest services/sos-service
          docker build -t ${{ secrets.DOCKER_USERNAME }}/helep-dispatch-service:latest services/dispatch-service
          docker build -t ${{ secrets.DOCKER_USERNAME }}/helep-notification-service:latest services/notification-service
          docker build -t ${{ secrets.DOCKER_USERNAME }}/helep-analytics-service:latest services/analytics-service
          docker push ${{ secrets.DOCKER_USERNAME }}/helep-user-service:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/helep-sos-service:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/helep-dispatch-service:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/helep-notification-service:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/helep-analytics-service:latest